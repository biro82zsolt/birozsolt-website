uses: SamKirkland/FTP-Deploy-Action@v4.3.5
with:
  server: ftp.zsoltbiro.hu
  username: ${{ secrets.FTP_USERNAME }}
  password: ${{ secrets.FTP_PASSWORD }}
  protocol: ftps
  security: loose
  port: 21
  server-dir: ./
  local-dir: ./
  exclude: |
    **/.git*
    **/.github*
    **/.venv*
    **/venv*
    **/__pycache__*
    **/shelf/*
    **/workspace.xml
    **/*.db
    **/*.sqlite3
    **/*.pyc
    **/*.pyo
    **/*.pyd